name: Daily Horizon Summary

on:
  schedule:
    # 每天 UTC 23:00 = 北京时间次日 07:00 推送
    - cron: '0 23 * * *'
  workflow_dispatch:      # 允许手动触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          # AI 提供商 (Gemini)
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # Server酱 完整推送 URL,例如:
          #   https://sctapi.ftqq.com/SCTxxxxxxxxxxxxxx.send
          SCT_PUSH_URL: ${{ secrets.SCT_PUSH_URL }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        if: ${{ vars.PUBLISH_GH_PAGES == 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
